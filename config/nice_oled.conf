## Display config for the nice_oled (SSD1306) shield. ZMK applies
## ${ZMK_CONFIG}/<shield>.conf per shield, so this is picked up only when
## "nice_oled" is in the shield list (the BT halves) and skipped by the dongle.
CONFIG_I2C=y
CONFIG_ZMK_DISPLAY=y
CONFIG_SSD1306=y
CONFIG_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
